         * 업무 텍스트에서 날짜 범위를 파싱합니다.
         * 지원 패턴:
         *   (3/12)         → 단일 날짜
         *   (~3/15)        → 해당 날까지
         *   (3/12~3/15)    → 날짜 범위
         *   (3월) / (4월 중) → 해당 월 전체
         */
        function parseTaskDates(task) {
            const Y = new Date().getFullYear();

            // (M/D~M/D) 범위
            let m = task.match(/\((\d{1,2})\/(\d{1,2})\s*~\s*(\d{1,2})\/(\d{1,2})\)/);
            if (m) return { start: new Date(Y, +m[1] - 1, +m[2]), end: new Date(Y, +m[3] - 1, +m[4]) };

            // (~M/D) 해당 날까지
            m = task.match(/\(~(\d{1,2})\/(\d{1,2})\)/);
            if (m) return { start: new Date(2000, 0, 1), end: new Date(Y, +m[1] - 1, +m[2]) };

            // (M/D 완료) 또는 (M/D완료)
            m = task.match(/\((\d{1,2})\/(\d{1,2})\s*완료\)/);
            if (m) { const d = new Date(Y, +m[1] - 1, +m[2]); return { start: d, end: d }; }

            // (M/D) 단일 날짜
            m = task.match(/\((\d{1,2})\/(\d{1,2})\)/);
            if (m) { const d = new Date(Y, +m[1] - 1, +m[2]); return { start: d, end: d }; }

            // (M월 중순) / (M월 중) / (M월) 등
            m = task.match(/\((\d{1,2})월(?:\s*(?:초|중순|중|말))?\)/);
            if (m) {
                const mo = +m[1] - 1;
                return { start: new Date(Y, mo, 1), end: new Date(Y, mo + 1, 0) };
            }

            return null; // 날짜 없음
        }

        /**
         * 주어진 날짜 범위에서 weekDates(7일) 중 해당하는 인덱스 반환
         */
        function getActiveIndices(start, end, weekDates) {
            // 비교를 위해 시간 정규화
            const s = new Date(start); s.setHours(0, 0, 0, 0);
            const e = new Date(end); e.setHours(23, 59, 59, 0);
            return weekDates.reduce((acc, d, i) => {
                const dt = new Date(d); dt.setHours(12, 0, 0, 0);
                if (dt >= s && dt <= e) acc.push(i);
                return acc;
            }, []);
        }

        /**
         * 현재 표시 주차 계산
         */
        function getCurrentWeeks() {
            const w1 = Array.from({ length: 7 }, (_, i) => addDays(baseMonday, i));
            const w2 = Array.from({ length: 7 }, (_, i) => addDays(addDays(baseMonday, 7), i));
            return { w1, w2 };
        }

        /**
         * 단일 행 날짜 자동 채우기 (업무내용 변경 시 호출)
         */
        function autoFillRow(gi, ri) {
            const row = groups[gi].rows[ri];
            const { w1, w2 } = getCurrentWeeks();

            // 파커님의 지혜: 상태보다 '날짜 힌트'를 우선하여 점을 찍습니다.
            const parsed = parseTaskDates(row.task);

            if (parsed) {
                // 특정 날짜가 명시된 경우 (예: 3/21 완료, ~3/28 등) 
                // 1, 2주차를 모두 아우르며 점을 찍어줍니다.
                row.d1 = getActiveIndices(parsed.start, parsed.end, w1);
                row.d2 = getActiveIndices(parsed.start, parsed.end, w2);
            } else {
                // 이름은 있지만 날짜 힌트가 아예 없는 경우
                if (row.status === '완료') {
                    row.d1 = []; row.d2 = [];
                } else if (row.status === '진행중') {
                    // 자동화: 1주차 평일 전체(월~금) 자동 토글
                    row.d1 = [0, 1, 2, 3, 4]; row.d2 = [];
                } else {
                    row.d1 = []; row.d2 = [];
                }
            }
            saveToStorage();
            renderOnly();
        }

        /**
         * 전체 행 일괄 자동 채우기 버튼
         */
        function autoFillAllDates() {
            const { w1, w2 } = getCurrentWeeks();
            let count = 0;

            groups.forEach(group => {
                group.rows.forEach(row => {
                    if (row.status === '완료') {
                        // 완료 → 이미 끝난 업무, ● 없음
                        row.d1 = [];
                        row.d2 = [];
                        count++;
                    } else {
                        const parsed = parseTaskDates(row.task);
                        if (parsed) {
                            row.d1 = getActiveIndices(parsed.start, parsed.end, w1);
                            row.d2 = getActiveIndices(parsed.start, parsed.end, w2);
                            count++;
                        } else if (row.status === '진행중') {
                            row.d1 = [0, 1, 2, 3, 4];
                            row.d2 = [0, 1, 2, 3, 4];
                            count++;
                        }
                        // 날짜 없는 예정 → 변경 없음
                    }
                });
            });

            saveToStorage();
            renderOnly();

            const msg = document.getElementById('saveMsg');
            msg.textContent = `🔄 ${count}개 행 날짜 자동 채우기 완료!`;
            msg.classList.add('show');
            setTimeout(() => { msg.textContent = '✅ 저장되었습니다'; msg.classList.remove('show'); }, 2200);
        }

        // ════════════════════════════════════════════
        //  오늘 열 하나의 큰 박스 오버레이
        // ════════════════════════════════════════════
        function drawTodayBox() {
            // 기존 오버레이 제거
            document.querySelectorAll('.today-col-overlay').forEach(el => el.remove());

            const tableWrap = document.getElementById('tableWrap');
            const scrollEl = document.querySelector('.table-scroll');
            if (!tableWrap || !scrollEl) return;

            tableWrap.style.position = 'relative';

            // 날짜 엸 요소 가삸오기 (td.today + th.today-th)
            const cells = tableWrap.querySelectorAll('.today, .today-th');
            if (cells.length === 0) return;

            const wrapRect = tableWrap.getBoundingClientRect();
            const scrollLeft = scrollEl.scrollLeft;

            // x좌표바로 그룹화 (같은 열)
            const colMap = {};
            cells.forEach(el => {
                const r = el.getBoundingClientRect();
                const xKey = Math.round(r.left);
                if (!colMap[xKey]) colMap[xKey] = [];
                colMap[xKey].push(r);
            });

            Object.values(colMap).forEach(rects => {
                const table = tableWrap.querySelector('table');
                const tableRect = table.getBoundingClientRect();

                const top = Math.min(...rects.map(r => r.top)) - wrapRect.top;
                // 테이블의 실제 바닥까지 박스를 확장
                const bottom = tableRect.bottom - wrapRect.top;
                const left = Math.min(...rects.map(r => r.left)) - wrapRect.left + scrollLeft;
                const width = Math.max(...rects.map(r => r.width));

                const box = document.createElement('div');
                box.className = 'today-col-overlay';
                box.style.top = `${top}px`;
                box.style.left = `${left}px`;
                box.style.width = `${width}px`;
                box.style.height = `${bottom - top}px`;
                tableWrap.appendChild(box);
            });
        }

        // 스크롤 시 오버레이 위치 재계산
        document.querySelector('.table-scroll').addEventListener('scroll', drawTodayBox);
        window.addEventListener('resize', drawTodayBox);

        render();
        // 렌더링 후 DOM 반영 대기
        setTimeout(drawTodayBox, 50);
    </script>
</body>
