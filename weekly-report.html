          ".",
          "."
        ]
      },
      {
        "status": "예정",
        "owner": "김하진",
        "task": "유플러스 장기고객 대상 프로모션 (화담숲) 설치",
        "d1": [],
        "d2": []
      }
    ]
  }
]; /* POSI_END */

        // 클래스 매핑 (dept 이름이 바뀌어도 색상 유지용)
        const CLS_LIST = ["BAT", "PMI", "KTG", "ELIZ", "UPLUS"];

        // ════════════════════════════════════════════
        //  데이터 로드/저장
        // ════════════════════════════════════════════
        function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

        let groups = deepClone(defaultGroups); // 기본값 (Firebase 로드 전 표시)

        // Firebase에서 최신 AI 취합 데이터 로드
        (async function loadFromFirebase() {
            try {
                const FIREBASE_CONFIG = {
                    apiKey: "AIzaSyBbP8bRR243tRj1KZ0vCbDMEVDjdEXXTWA",
                    authDomain: "posi-design.firebaseapp.com",
                    projectId: "posi-design",
                    storageBucket: "posi-design.firebasestorage.app",
                    messagingSenderId: "122773865462",
                    appId: "1:122773865462:web:666344c71cc29856babdd7"
                };
                if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
                const db = firebase.firestore();
                const doc = await db.collection('final_reports').doc('latest').get();
                if (doc.exists && doc.data().groups) {
                    const firebaseGroups = JSON.parse(doc.data().groups);
                    groups = firebaseGroups;
                    render(); // Firebase 데이터로 재렌더링
                    const info = document.getElementById('reportInfo');

            }
        })();


        function saveToStorage() {
            localStorage.setItem('weeklyReport', JSON.stringify(groups));
        }

        function saveNow() {
            saveToStorage();
            const msg = document.getElementById('saveMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 1800);
        }

        function resetData() {
            if (confirm('모든 내용을 초기 데이터로 되돌리겠습니까?\n(저장된 내용이 삭제됩니다)')) {
                localStorage.removeItem('weeklyReport');
                groups = deepClone(defaultGroups);
                render();
            }
        }

        // ════════════════════════════════════════════
        //  날짜 유틸
        // ════════════════════════════════════════════
        const DAY_KO = ["월", "화", "수", "목", "금", "토", "일"];
        let baseMonday = getMonday(new Date());

        function getMonday(d) {
            const day = d.getDay(), diff = day === 0 ? -6 : 1 - day;
            const m = new Date(d); m.setDate(d.getDate() + diff); m.setHours(0, 0, 0, 0); return m;
        }
        function addDays(d, n) { const r = new Date(d); r.setDate(d.getDate() + n); return r; }
        function fmt(d) { return `${d.getMonth() + 1}/${d.getDate()}`; }
        function weekRange(m) { return `${fmt(m)}(월)~${fmt(addDays(m, 6))}(일)`; }


        // ════════════════════════════════════════════
        //  이벤트 핸들러
        // ════════════════════════════════════════════
        function toggleDate(gi, ri, week, day) {
            const arr = week === 1 ? groups[gi].rows[ri].d1 : groups[gi].rows[ri].d2;
            const idx = arr.indexOf(day);
            if (idx >= 0) arr.splice(idx, 1); else arr.push(day);
            saveToStorage();
            renderOnly(); // 전체 재렌더 없이 ●만 업데이트
        }

        function cycleStatus(gi, ri) {
            const s = ['완료', '진행중', '예정'];
            const cur = groups[gi].rows[ri].status;
            groups[gi].rows[ri].status = s[(s.indexOf(cur) + 1) % 3];
            saveToStorage();
            // 해당 셀만 업데이트
            const el = document.getElementById(`st_${gi}_${ri}`);
            if (el) {
                const ns = groups[gi].rows[ri].status;
                el.textContent = ns;
                el.className = `status-cell ${ns === '완료' ? 'status-done' : ns === '진행중' ? 'status-ing' : 'status-plan'}`;
            }
        }

        function updateTask(gi, ri, val) {
            groups[gi].rows[ri].task = val;
            autoFillRow(gi, ri); // 날짜 자동 파싱 후 적용
        }

        function updateOwner(gi, ri, val) {
            groups[gi].rows[ri].owner = val;
            saveToStorage();
        }

        function updateDept(gi, val) {
            groups[gi].dept = val;
            saveToStorage();
        }

        function addRow(gi) {
            groups[gi].rows.push({ status: '예정', owner: '', task: '새 업무 입력', d1: [], d2: [] });
            saveToStorage();
            render();
        }

        function deleteRow(gi, ri) {
            if (groups[gi].rows.length <= 1) { alert('최소 1개 행은 유지해야 합니다.'); return; }
            if (confirm(`"${groups[gi].rows[ri].task}" 행을 삭제하시겠습니까?`)) {
                groups[gi].rows.splice(ri, 1);
                saveToStorage();
                render();
            }
        }

        // ● 셀만 빠르게 업데이트 (전체 재렌더 없이)
        function renderOnly() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const w1 = Array.from({ length: 7 }, (_, i) => addDays(baseMonday, i));
            const w2Mon = addDays(baseMonday, 7);
            const w2 = Array.from({ length: 7 }, (_, i) => addDays(w2Mon, i));
            groups.forEach((g, gi) => {
                g.rows.forEach((row, ri) => {
                    [1, 2].forEach(week => {
                        const dates = week === 1 ? w1 : w2;
                        dates.forEach((_, di) => {
                            const el = document.getElementById(`dc_${gi}_${ri}_${week}_${di}`);
                            if (el) {
                                const arr = week === 1 ? row.d1 : row.d2;
                                el.textContent = arr.includes(di) ? '●' : '';
                            }
                        });
                    });
                });
            });
            // 오늘 박스 재스케줄
            setTimeout(drawTodayBox, 20);
        }

        // ════════════════════════════════════════════
        //  전체 렌더링
        // ════════════════════════════════════════════
        function render() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const w1 = Array.from({ length: 7 }, (_, i) => addDays(baseMonday, i));
            const w2Mon = addDays(baseMonday, 7);
            const w2 = Array.from({ length: 7 }, (_, i) => addDays(w2Mon, i));

            // 제목
            document.getElementById('reportTitle').innerHTML =
                `POSI DESIGN TEAM <span class="sub">— 디자인 연구소 주간업무보고</span>` +
                `<span class="week-badge">1주: ${weekRange(baseMonday)} &nbsp;|&nbsp; 2주: ${weekRange(w2Mon)}</span>`;

            // ── 헤더 ──
            let h = `<table><thead>
    <tr class="week-label">
      <th class="col-fixed" colspan="5"></th>
      <th class="week1-lbl" colspan="7">📅 1주차 (${weekRange(baseMonday)})</th>
      <th class="week2-lbl" colspan="7">📅 2주차 (${weekRange(w2Mon)})</th>
    </tr>
    <tr class="date-row">
      <th class="col-del"></th>
      <th class="col-dept">부서</th>
      <th class="col-owner">작성자</th>
      <th class="col-status">구분</th>
      <th class="col-task">업무내용</th>`;

            w1.forEach((d, i) => {
                const wk = i >= 5, isTd = d.getTime() === today.getTime();
                h += `<th class="${wk ? 'weekend' : ''} ${isTd ? 'today-th' : ''}">${fmt(d)}<br>(${DAY_KO[i]})</th>`;
            });
            w2.forEach((d, i) => {
                const wk = i >= 5, isTd = d.getTime() === today.getTime();
                h += `<th class="${wk ? 'weekend' : ''} ${i === 0 ? 'w2-sep' : ''} ${isTd ? 'today-th' : ''}">${fmt(d)}<br>(${DAY_KO[i]})</th>`;
            });
            h += `</tr></thead><tbody>`;

            // ── 데이터 행 ──
            groups.forEach((group, gi) => {
                const rowCls = `dept-${CLS_LIST[gi] || group.cls}`;
                const sCls = (s) => s === '완료' ? 'status-done' : s === '진행중' ? 'status-ing' : 'status-plan';

                group.rows.forEach((row, ri) => {
                    h += `<tr class="${rowCls}">`;

                    // 삭제 버튼
                    h += `<td class="del-cell"><button class="btn-del-row" onclick="deleteRow(${gi},${ri})" title="행 삭제">✕</button></td>`;

                    // 부서 (rowspan + contenteditable)
                    if (ri === 0) {
                        h += `<td class="dept-cell" rowspan="${group.rows.length}"
          contenteditable="true"
          onblur="updateDept(${gi},this.textContent.trim())"
          title="클릭하여 부서명 편집">${group.dept}</td>`;
                    }

                    // 작성자
                    h += `<td class="owner-cell" contenteditable="true"
        onblur="updateOwner(${gi},${ri},this.textContent.trim())"
        title="클릭하여 작성자 편집">${row.owner || ""}</td>`;

                    // 구분 (클릭으로 순환)
                    h += `<td id="st_${gi}_${ri}" class="status-cell ${sCls(row.status)}"
        onclick="cycleStatus(${gi},${ri})" title="클릭하여 상태 변경">${row.status}</td>`;

                    // 업무내용 (contenteditable)
                    h += `<td class="task-cell" contenteditable="true"
        onblur="updateTask(${gi},${ri},this.textContent.trim())"
        title="클릭하여 업무내용 편집">${row.task}</td>`;

                    // 1주차 날짜
                    w1.forEach((d, di) => {
                        const wk = di >= 5, td = d.getTime() === today.getTime();
                        const on = row.d1.includes(di);
                        h += `<td id="dc_${gi}_${ri}_1_${di}"
          class="date-cell${wk ? ' weekend' : ''}${td ? ' today' : ''}"
          onclick="toggleDate(${gi},${ri},1,${di})"
          title="${fmt(d)} 클릭하여 토글">${on ? '●' : ''}</td>`;
                    });

                    // 2주차 날짜
                    w2.forEach((d, di) => {
                        const wk = di >= 5, td = d.getTime() === today.getTime();
                        const on = row.d2.includes(di);
                        h += `<td id="dc_${gi}_${ri}_2_${di}"
          class="date-cell${wk ? ' weekend' : ''}${td ? ' today' : ''}${di === 0 ? ' w2-sep' : ''}"
          onclick="toggleDate(${gi},${ri},2,${di})"
          title="${fmt(d)} 클릭하여 토글">${on ? '●' : ''}</td>`;
                    });

                    h += `</tr>`;
                });

                // 행 추가 버튼
                h += `<tr class="add-row-tr ${rowCls}"><td colspan="19">
      <button class="btn-add-row" onclick="addRow(${gi})">+ ${group.dept} 행 추가</button>
    </td></tr>`;
            });

            h += `</tbody></table>`;
            document.getElementById('tableWrap').innerHTML = h;
        }

        // ════════════════════════════════════════════
        //  날짜 자동 파싱 & 채우기
        // ════════════════════════════════════════════

        /**
         * 업무 텍스트에서 날짜 범위를 파싱합니다.
         * 지원 패턴:
         *   (3/12)         → 단일 날짜
         *   (~3/15)        → 해당 날까지
         *   (3/12~3/15)    → 날짜 범위
         *   (3월) / (4월 중) → 해당 월 전체
         */
        function parseTaskDates(task) {
            const Y = new Date().getFullYear();

            // (M/D~M/D) 범위
            let m = task.match(/\((\d{1,2})\/(\d{1,2})\s*~\s*(\d{1,2})\/(\d{1,2})\)/);
            if (m) return { start: new Date(Y, +m[1] - 1, +m[2]), end: new Date(Y, +m[3] - 1, +m[4]) };

            // (~M/D) 해당 날까지
            m = task.match(/\(~(\d{1,2})\/(\d{1,2})\)/);
            if (m) return { start: new Date(2000, 0, 1), end: new Date(Y, +m[1] - 1, +m[2]) };

            // (M/D 완료) 또는 (M/D완료)
            m = task.match(/\((\d{1,2})\/(\d{1,2})\s*완료\)/);
            if (m) { const d = new Date(Y, +m[1] - 1, +m[2]); return { start: d, end: d }; }

            // (M/D) 단일 날짜
            m = task.match(/\((\d{1,2})\/(\d{1,2})\)/);
            if (m) { const d = new Date(Y, +m[1] - 1, +m[2]); return { start: d, end: d }; }

            // (M월 중순) / (M월 중) / (M월) 등
            m = task.match(/\((\d{1,2})월(?:\s*(?:초|중순|중|말))?\)/);
            if (m) {
                const mo = +m[1] - 1;
                return { start: new Date(Y, mo, 1), end: new Date(Y, mo + 1, 0) };
            }

            return null; // 날짜 없음
        }

        /**
         * 주어진 날짜 범위에서 weekDates(7일) 중 해당하는 인덱스 반환
         */
        function getActiveIndices(start, end, weekDates) {
            // 비교를 위해 시간 정규화
            const s = new Date(start); s.setHours(0, 0, 0, 0);
            const e = new Date(end); e.setHours(23, 59, 59, 0);
            return weekDates.reduce((acc, d, i) => {
                const dt = new Date(d); dt.setHours(12, 0, 0, 0);
                if (dt >= s && dt <= e) acc.push(i);
                return acc;
            }, []);
        }

        /**
         * 현재 표시 주차 계산
         */
        function getCurrentWeeks() {
            const w1 = Array.from({ length: 7 }, (_, i) => addDays(baseMonday, i));
            const w2 = Array.from({ length: 7 }, (_, i) => addDays(addDays(baseMonday, 7), i));
            return { w1, w2 };
        }

        /**
         * 단일 행 날짜 자동 채우기 (업무내용 변경 시 호출)
         */
        function autoFillRow(gi, ri) {
            const row = groups[gi].rows[ri];
            const { w1, w2 } = getCurrentWeeks();

            if (row.status === '완료') {
                // 완료 → 이미 끝난 업무, ● 없음
                row.d1 = [];
                row.d2 = [];
            } else {
                const parsed = parseTaskDates(row.task);
                if (parsed) {
                    row.d1 = getActiveIndices(parsed.start, parsed.end, w1);
                    row.d2 = getActiveIndices(parsed.start, parsed.end, w2);
                } else if (row.status === '진행중') {
                    // 날짜 명시 없는 진행중 → 평일 전체
                    row.d1 = [0, 1, 2, 3, 4];
                    row.d2 = [0, 1, 2, 3, 4];
                }
                // 날짜 없는 예정 → 변경 없음
            }
            saveToStorage();
            renderOnly();
        }

        /**
         * 전체 행 일괄 자동 채우기 버튼
         */
        function autoFillAllDates() {
            const { w1, w2 } = getCurrentWeeks();
            let count = 0;

            groups.forEach(group => {
                group.rows.forEach(row => {
                    if (row.status === '완료') {
                        // 완료 → 이미 끝난 업무, ● 없음
                        row.d1 = [];
                        row.d2 = [];
                        count++;
                    } else {
                        const parsed = parseTaskDates(row.task);
                        if (parsed) {
                            row.d1 = getActiveIndices(parsed.start, parsed.end, w1);
                            row.d2 = getActiveIndices(parsed.start, parsed.end, w2);
                            count++;
                        } else if (row.status === '진행중') {
                            row.d1 = [0, 1, 2, 3, 4];
                            row.d2 = [0, 1, 2, 3, 4];
                            count++;
                        }
                        // 날짜 없는 예정 → 변경 없음
                    }
                });
            });

            saveToStorage();
            renderOnly();

            const msg = document.getElementById('saveMsg');
            msg.textContent = `🔄 ${count}개 행 날짜 자동 채우기 완료!`;
            msg.classList.add('show');
            setTimeout(() => { msg.textContent = '✅ 저장되었습니다'; msg.classList.remove('show'); }, 2200);
        }

        // ════════════════════════════════════════════
        //  오늘 열 하나의 큰 박스 오버레이
        // ════════════════════════════════════════════
        function drawTodayBox() {
            // 기존 오버레이 제거
            document.querySelectorAll('.today-col-overlay').forEach(el => el.remove());

            const tableWrap = document.getElementById('tableWrap');
            const scrollEl = document.querySelector('.table-scroll');
            if (!tableWrap || !scrollEl) return;

            tableWrap.style.position = 'relative';

            // 날짜 엸 요소 가삸오기 (td.today + th.today-th)
            const cells = tableWrap.querySelectorAll('.today, .today-th');
            if (cells.length === 0) return;

            const wrapRect = tableWrap.getBoundingClientRect();
            const scrollLeft = scrollEl.scrollLeft;

            // x좌표바로 그룹화 (같은 열)
            const colMap = {};
            cells.forEach(el => {
                const r = el.getBoundingClientRect();
                const xKey = Math.round(r.left);
                if (!colMap[xKey]) colMap[xKey] = [];
                colMap[xKey].push(r);
            });

            Object.values(colMap).forEach(rects => {
                const table = tableWrap.querySelector('table');
                const tableRect = table.getBoundingClientRect();

                const top = Math.min(...rects.map(r => r.top)) - wrapRect.top;
                // 테이블의 실제 바닥까지 박스를 확장
                const bottom = tableRect.bottom - wrapRect.top;
                const left = Math.min(...rects.map(r => r.left)) - wrapRect.left + scrollLeft;
                const width = Math.max(...rects.map(r => r.width));

                const box = document.createElement('div');
                box.className = 'today-col-overlay';
                box.style.top = `${top}px`;
                box.style.left = `${left}px`;
                box.style.width = `${width}px`;
                box.style.height = `${bottom - top}px`;
                tableWrap.appendChild(box);
            });
        }

        // 스크롤 시 오버레이 위치 재계산
        document.querySelector('.table-scroll').addEventListener('scroll', drawTodayBox);
        window.addEventListener('resize', drawTodayBox);

        render();
        // 렌더링 후 DOM 반영 대기
        setTimeout(drawTodayBox, 50);
    </script>
