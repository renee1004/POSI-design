<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POSI DESIGN — 주간업무 AI 취합 허브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --navy: #1e3a5f; --blue: #2d5f9e; --blue-lt: #4a7fc0; --accent: #ff6b35;
  --green: #27ae60; --amber: #d45b00; --bg: #eef1f6; --text: #1a1f2e;
  --muted: #6b7280; --border: #c8cdd6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── UI 스타일 (기존과 동일) ── */
.topbar { background: var(--navy); padding: 12px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.2); }
.topbar-logo { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.topbar-logo span { color: #ff6b35; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,.6); border-left: 1px solid rgba(255,255,255,.2); padding-left: 12px; margin-left: 4px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #27ae60; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(39,174,96,.5); } 50% { opacity:.8; box-shadow:0 0 0 6px rgba(39,174,96,0); } }
.status-txt { font-size: 11px; color: rgba(255,255,255,.7); }
.layout { display: grid; grid-template-columns: 280px 1fr 320px; min-height: calc(100vh - 50px); }
.sidebar { background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--navy); }
.room-list { overflow-y: auto; flex:1; padding: 8px 0; }
.room-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; }
.room-item:hover { background: #f5f7fa; }
.room-item.active { background: #e8f0fb; border-left-color: var(--blue); }
.room-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.room-info { flex:1; min-width:0; }
.room-name { font-size: 12px; font-weight: 600; }
.room-last { font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.room-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; }
.room-item.done .room-badge { background: var(--green); }
.sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }
.sidebar-label { font-size: 10px; font-weight: 700; color: var(--muted); padding: 6px 16px 4px; }
.collect-room { margin: 8px 12px; border-radius: 10px; border: 2px solid var(--blue); background: #e8f0fb; padding: 10px 14px; cursor: pointer; }
.collect-room-title { font-size: 12px; font-weight: 700; color: var(--navy); }
.collect-room-sub { font-size: 10.5px; color: var(--muted); margin-top: 3px; }
.main-chat { display: flex; flex-direction: column; background: #f8f9fc; overflow: hidden; }
.chat-header { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
.chat-header-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
.chat-header-info { flex:1; }
.chat-header-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.chat-header-sub { font-size: 11px; color: var(--muted); }
.chat-header-actions { display: flex; gap: 8px; }
.btn { padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 11.5px; font-weight: 600; transition: all .15s; }
.btn-primary { background: var(--navy); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn-outline { background: #fff; color: var(--blue); border: 1px solid var(--blue); }
.btn-amber { background: #fff5e6; color: var(--amber); border: 1px solid #e8a070; }
.messages { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg-wrap { display: flex; align-items: flex-start; gap: 10px; }
.msg-wrap.self { flex-direction: row-reverse; }
.msg-avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
.msg-content { max-width: 65%; }
.msg-name { font-size: 10.5px; color: var(--muted); margin-bottom: 3px; }
.msg-wrap.self .msg-name { text-align: right; }
.msg-bubble { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; }
.msg-wrap.self .msg-bubble { background: var(--navy); color: #fff; border-color: var(--navy); }
.msg-bubble.system { background: #fffbe6; border: 1px dashed #e8c860; font-size: 11.5px; color: #6a4a00; text-align:center; margin: 0 auto; max-width: 80%; }
.msg-bubble.ai-result { background: linear-gradient(135deg, #e8f4fb 0%, #eef6f0 100%); border: 1.5px solid #a8d4f0; }
.chat-input-wrap { background: #fff; border-top: 1px solid var(--border); padding: 12px 16px; }
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 14px; font-size: 13px; resize: none; outline: none; min-height: 42px; }
.btn-send { width: 42px; height: 42px; border-radius: 10px; border: none; background: var(--navy); color: #fff; cursor: pointer; font-size: 16px; }
.input-hint { font-size: 10px; color: var(--muted); margin-top: 5px; }
.right-panel { background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
.panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-title { font-size: 13px; font-weight: 700; color: var(--navy); flex:1; }
.panel-body { flex:1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.report-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.report-card-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; font-size: 11.5px; font-weight: 700; }
.report-card-body { padding: 10px 12px; font-size: 11.5px; line-height: 1.7; background: #fafbfd; border-top: 1px solid var(--border); max-height: 140px; overflow-y: auto; white-space: pre-wrap; }
.team-progress { display: flex; flex-direction: column; gap: 7px; }
.team-row { display: flex; align-items: center; gap: 8px; }
.team-row-name { font-size: 11.5px; font-weight: 600; width: 75px; }
.team-row-bar { flex:1; height: 7px; background: #e8ecf2; border-radius: 4px; overflow:hidden; }
.team-row-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.team-row-stat { font-size: 10px; font-weight: 700; width: 36px; text-align: right; }
.modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 640px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
.modal-header-title { font-size: 15px; font-weight: 700; color: var(--navy); flex:1; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
.modal-body { padding: 20px; overflow-y: auto; flex:1; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11.5px; font-weight: 700; color: var(--navy); margin-bottom: 5px; display:block; }
.form-input, .form-textarea, .form-select { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12.5px; }
.form-textarea { resize: vertical; min-height: 120px; }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
#toast.show { opacity:1; transform: translateY(0); }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>
<body>

<div class="topbar">
  <div class="topbar-logo">POSI <span>DESIGN</span></div>
  <div class="topbar-sub">주간업무보고 AI 취합 허브 (Real-time)</div>
  <div class="topbar-right">
    <div class="status-dot"></div>
    <div class="status-txt">서버 실시간 동기화 중</div>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1);font-size:11px;" onclick="openSettings()">⚙️ 설정</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">🏠 팀별 에이전트 방</div>
    <div class="sidebar-label">각 팀 보고방</div>
    <div class="room-list" id="roomList"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">취합 에이전트</div>
    <div class="collect-room" onclick="switchRoom('collect')">
      <div class="collect-room-title">🤖 AI 취합방</div>
      <div class="collect-room-sub">전 팀 보고서 자동 취합 · 업데이트</div>
    </div>
    <div style="padding:12px;">
      <button class="btn btn-success" style="width:100%;font-size:12px;" onclick="runCollectAll()">⚡ 전체 취합 & 업데이트</button>
    </div>
  </div>

  <div class="main-chat">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-avatar" id="chatAvatar" style="background:#1e3a5f;">🤖</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatName">AI 취합방</div>
        <div class="chat-header-sub" id="chatSub">전체 취합 & 주간업무보고 자동 업데이트</div>
      </div>
      <div class="chat-header-actions">
        <button class="btn btn-amber" onclick="openSubmitModal()">📤 보고서 제출</button>
        <button class="btn btn-outline" onclick="openPreview()">👁 미리보기</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈, Enter: 전송)" rows="1"></textarea>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-header">
      <div class="panel-title">📊 실시간 취합 현황</div>
    </div>
    <div class="panel-body" id="rightPanel"></div>
  </div>
</div>

<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-title">📤 팀별 주간업무보고서 제출</div>
      <button class="modal-close" onclick="closeModal('submitModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">팀 선택</label>
        <select class="form-select" id="submitTeam"></select>
      </div>
      <div class="form-group">
        <label class="form-label">팀장 이름</label>
        <input type="text" class="form-input" id="submitLeader" placeholder="예: 홍길동 팀장">
      </div>
      <div class="form-group">
        <label class="form-label">보고 내용 (자유 형식)</label>
        <textarea class="form-textarea" id="submitContent" placeholder="자유 형식으로 작성해도 AI가 파싱합니다."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('submitModal')">취소</button>
      <button class="btn btn-success" onclick="submitReport()">✅ 제출</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-title">⚙️ AI 에이전트 설정</div>
      <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Gemini API Key</label>
        <input type="password" class="form-input" id="apiKeyInput" placeholder="AIza...">
      </div>
      <div class="form-group">
        <label class="form-label">팀 목록 (쉼표로 구분)</label>
        <input type="text" class="form-input" id="teamsInput">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('settingsModal')">취소</button>
      <button class="btn btn-primary" onclick="saveSettings()">💾 저장</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="previewModal">
  <div class="modal" style="width:760px;max-width:97vw;">
    <div class="modal-header">
      <div class="modal-header-title">👁 주간업무보고 미리보기</div>
      <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <iframe id="previewFrame" style="width:100%;height:500px;border:none;"></iframe>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('previewModal')">닫기</button>
      <button class="btn btn-success" onclick="downloadReport()">⬇️ HTML 다운로드</button>
    </div>
  </div>
</div>

<div id="toast">✅ 완료</div>

<script>
// =========================================================
// 1. Firebase 초기 설정 (여기에 본인의 Config를 붙여넣으세요)
// =========================================================
const firebaseConfig = {
  apiKey: "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",
  authDomain: "posi-design.firebaseapp.com",
  projectId: "posi-design",
  storageBucket: "posi-design.firebasestorage.app",
  messagingSenderId: "122773865462",
  appId: "1:122773865462:web:666344c71cc29856babdd7"
};

// Firebase 앱 초기화 및 Firestore DB 연결
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

// =========================================================
// 2. 상태 관리 (State)
// =========================================================
let settings = {
  apiKey: '',
  teams: ['BAT','PMI','KT&G글로벌','엘리자베스아덴','U+']
};
let currentRoom = 'collect';
let reports = {}; // Firestore에서 실시간으로 동기화될 객체

const TEAM_COLORS = { 'BAT':'#1e3a5f', 'PMI':'#c0392b', 'KT&G글로벌':'#27ae60', '엘리자베스아덴':'#8e44ad', 'U+':'#d4a800', 'collect':'#2d5f9e' };
const TEAM_ABBR = { 'BAT':'BAT', 'PMI':'PMI', 'KT&G글로벌':'KTG', '엘리자베스아덴':'ELZ', 'U+':'U+', 'collect':'🤖' };

// =========================================================
// 3. 초기화 및 Firestore 실시간 리스너 연결
// =========================================================
function init() {
  loadSettings();
  initRooms();
  switchRoom('collect');
  
  // 🔥 Firestore의 "reports" 컬렉션의 변화를 실시간으로 감지합니다.
  db.collection("reports").onSnapshot((snapshot) => {
    reports = {}; // 초기화 후 새 데이터 덮어쓰기
    snapshot.forEach((doc) => {
      reports[doc.id] = doc.data(); // doc.id는 팀 이름(BAT 등)
    });
    // 데이터가 바뀔 때마다 화면(우측 패널 및 사이드바)을 즉시 업데이트
    renderRightPanel();
    renderSidebar();
  });
}

function loadSettings() {
  const s = localStorage.getItem('hubSettings');
  if (s) settings = { ...settings, ...JSON.parse(s) };
  document.getElementById('apiKeyInput').value = settings.apiKey || '';
  document.getElementById('teamsInput').value = settings.teams.join(',');
}

function saveSettings() {
  settings.apiKey = document.getElementById('apiKeyInput').value.trim();
  settings.teams = document.getElementById('teamsInput').value.split(',').map(t=>t.trim()).filter(Boolean);
  localStorage.setItem('hubSettings', JSON.stringify(settings));
  initRooms();
  closeModal('settingsModal');
  toast('✅ 설정 저장 완료');
}

function initRooms() {
  const selectEl = document.getElementById('submitTeam');
  selectEl.innerHTML = '<option value="">팀을 선택하세요</option>';
  settings.teams.forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t;
    selectEl.appendChild(o);
  });
  renderSidebar();
}

function switchRoom(roomId) {
  currentRoom = roomId;
  const isCollect = roomId === 'collect';
  document.getElementById('chatAvatar').style.background = TEAM_COLORS[roomId] || '#1e3a5f';
  document.getElementById('chatAvatar').textContent = TEAM_ABBR[roomId] || roomId.substring(0,3);
  document.getElementById('chatName').textContent = isCollect ? 'AI 취합방' : `${roomId} 팀 보고방`;
  renderSidebar();
  renderMessages();
}

// =========================================================
// 4. UI 렌더링 함수들
// =========================================================
function renderSidebar() {
  document.getElementById('roomList').innerHTML = settings.teams.map(t => {
    const rep = reports[t];
    const color = TEAM_COLORS[t] || '#666';
    const abbr = TEAM_ABBR[t] || t.substring(0,3);
    return `
      <div class="room-item ${rep ? 'done' : ''} ${currentRoom===t ? 'active' : ''}" onclick="switchRoom('${t}')">
        <div class="room-avatar" style="background:${color}">${abbr}</div>
        <div class="room-info">
          <div class="room-name">${t} 팀</div>
          <div class="room-last">${rep ? rep.leader + ' 제출 완료' : '보고서 대기중'}</div>
        </div>
        ${rep ? '<span class="room-badge done">✓</span>' : '<span class="room-badge">대기</span>'}
      </div>
    `;
  }).join('');
}

function renderRightPanel() {
  const el = document.getElementById('rightPanel');
  const total = settings.teams.length;
  const done = Object.keys(reports).length;

  let html = `
    <div class="team-progress" style="margin-bottom: 15px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);">팀별 제출 현황 (${done}/${total})</div>
      ${settings.teams.map((t,i) => {
        const rep = reports[t];
        const pct = rep ? 100 : 0;
        const color = Object.values(TEAM_COLORS)[i % 5];
        return `
          <div class="team-row" style="margin-top:6px;">
            <div class="team-row-name">${t}</div>
            <div class="team-row-bar"><div class="team-row-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="team-row-stat" style="color:${rep?'#27ae60':'#aaa'}">${rep?'✓':'대기'}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  if (done > 0) {
    Object.entries(reports).forEach(([team, rep]) => {
      const color = TEAM_COLORS[team] || '#666';
      html += `
        <div class="report-card">
          <div class="report-card-header" style="background:${color}15;color:${color}">
            ${team} — ${rep.leader} <span style="margin-left:auto; font-size:10px;">${rep.time}</span>
          </div>
          <div class="report-card-body">${rep.rows.map(r=>`[${r.status}] ${r.task}`).join('\n')}</div>
        </div>
      `;
    });
  }
  el.innerHTML = html;
}

function renderMessages() {
  const el = document.getElementById('messages');
  if(currentRoom === 'collect') {
    el.innerHTML = `<div class="msg-bubble system">👋 팀장들이 제출한 보고서가 이곳에서 실시간으로 취합됩니다.</div>`;
  } else {
    const rep = reports[currentRoom];
    if(rep) {
       el.innerHTML = `<div class="msg-bubble ai-result" style="border-left: 4px solid var(--green);">✅ <b>${rep.leader}</b>님의 보고서가 성공적으로 서버에 저장되었습니다.<br><br>${rep.rows.map(r=>`• [${r.status}] ${r.task}`).join('<br>')}</div>`;
    } else {
       el.innerHTML = `<div class="msg-bubble system">현재 제출된 주간업무가 없습니다. [보고서 제출] 버튼을 눌러주세요.</div>`;
    }
  }
}

// =========================================================
// 5. 보고서 파싱 및 Firestore 저장
// =========================================================
function openSubmitModal() { document.getElementById('submitModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function submitReport() {
  const team = document.getElementById('submitTeam').value;
  const leader = document.getElementById('submitLeader').value.trim() || '팀장';
  const content = document.getElementById('submitContent').value.trim();

  if (!team || !content) { alert('팀과 보고 내용을 모두 입력해 주세요.'); return; }
  if (!settings.apiKey) { alert('설정에서 Gemini API 키를 입력해 주세요.'); return; }

  closeModal('submitModal');
  toast('⏳ AI 파싱 및 서버 전송 중...');

  try {
    // 1. Gemini로 텍스트 구조화 파싱
    const prompt = `주간업무보고서를 JSON으로 변환. 입력:\n${content}\n형식:[{"status":"완료/진행중/예정","task":"업무내용","owner":"${leader}","d1":[],"d2":[]}]`;
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${settings.apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
    const parsedRows = JSON.parse(cleanJson);

    // 2. 🔥 파싱된 데이터를 Firestore 데이터베이스에 저장
    const now = new Date();
    await db.collection("reports").doc(team).set({
      leader: leader,
      rows: parsedRows,
      time: `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`
    });

    toast(`✅ ${team} 팀 보고서 제출 완료! (서버 동기화 됨)`);
    document.getElementById('submitContent').value = '';
    switchRoom(team);

  } catch(e) {
    alert('오류 발생: ' + e.message);
  }
}

// =========================================================
// 6. 전체 취합 및 HTML 생성 (기존 로직 유지)
// =========================================================
let updatedReportHTML = null;
let REPORT_TEMPLATE = '';
(async () => {
  try {
    const res = await fetch('./weekly-report.html');
    if (res.ok) REPORT_TEMPLATE = await res.text();
  } catch(e) { console.warn('템플릿 로드 실패', e); }
})();

function runCollectAll() {
  if (Object.keys(reports).length === 0) { alert('수신된 보고서가 없습니다.'); return; }
  switchRoom('collect');
  
  if (!REPORT_TEMPLATE) {
    alert('원본 HTML 템플릿(weekly-report.html)이 같은 폴더에 없거나 로드되지 않았습니다.');
    return;
  }

  // Firestore에서 받은 실시간 데이터를 템플릿용 구조로 매핑
  const newGroups = settings.teams.map((team, idx) => {
    const clsMap = ['BAT','PMI','KTG','ELIZ','UPLUS'];
    const rep = reports[team];
    if (!rep) return { dept: team, cls: clsMap[idx], rows: [{ status:'', owner:'', task:'', d1:[], d2:[] }] };
    return { dept: team, cls: clsMap[idx], rows: rep.rows };
  });

  const groupsJson = JSON.stringify(newGroups, null, 2);
  let result = REPORT_TEMPLATE.replace(/const defaultGroups = \[[\s\S]*?\];/, `const defaultGroups = ${groupsJson};`);
  result = result.replace(/let groups = \(\(\) => \{[\s\S]*?\}\)\(\);/, `let groups = JSON.parse(JSON.stringify(defaultGroups));`);
  
  updatedReportHTML = result;
  toast('✅ 전체 취합 및 HTML 업데이트 완료!');
}

function openPreview() {
  if (!updatedReportHTML) { alert('먼저 [전체 취합] 버튼을 눌러주세요.'); return; }
  document.getElementById('previewFrame').srcdoc = updatedReportHTML;
  document.getElementById('previewModal').classList.add('open');
}

function downloadReport() {
  if (!updatedReportHTML) { alert('먼저 [전체 취합] 버튼을 눌러주세요.'); return; }
  const blob = new Blob([updatedReportHTML], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `weekly-report-${new Date().getTime()}.html`;
  a.click();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// 시작
init();
</script>
