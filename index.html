<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSI INTELLIGENT HUB — AI 주간보고 통합 플랫폼</title>
    <!-- Google Fonts: Outfit, Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Firebase SDK (Lite) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-deep: #080b12;
            --bg-glass: rgba(18, 24, 40, 0.7);
            --sidebar-bg: #0d121f;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text-primary: #f1f3f9;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(14px);
            --success: #00d2d3;
            --error: #ff4d4d;
            --bat: #3b82f6;
            --pmi: #f97316;
            --ktg: #10b981;
            --eliz: #a855f7;
            --uplus: #eab308;
            --ai-glow: 0 0 20px rgba(108, 92, 231, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        h1,
        h2,
        h3,
        .logo-text {
            font-family: 'Outfit', sans-serif;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            z-index: 100;
        }

        .logo {
            padding: 0 24px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-sections {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 24px 0 12px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(108, 92, 231, 0.1);
            color: #fff;
            border-color: rgba(108, 92, 231, 0.2);
            box-shadow: inset 0 0 10px rgba(108, 92, 231, 0.05);
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-bat {
            background: var(--bat);
        }

        .dot-pmi {
            background: var(--pmi);
        }

        .dot-ktg {
            background: var(--ktg);
        }

        .dot-eliz {
            background: var(--eliz);
        }

        .dot-uplus {
            background: var(--uplus);
        }

        .dot-mgr {
            background: var(--accent);
        }

        /* ── Main Content ── */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, #1a1f35 0%, #080b12 70%);
            position: relative;
        }

        .top-bar {
            height: 64px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-glass);
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
        }

        .view-title {
            font-size: 18px;
            font-weight: 600;
        }

        .user-controls {
            display: flex;
            gap: 16px;
        }

        .btn-settings {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border-glass);
            transition: 0.3s;
        }

        .btn-settings:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
        }

        /* ── View Content Area ── */
        .content-body {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .view-pane {
            width: 100%;
            max-width: 900px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .view-pane.active {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .textarea-premium {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 20px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            transition: 0.3s;
            resize: vertical;
        }

        .textarea-premium:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.15);
        }

        .btn-premium {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #8e44ad);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.5);
        }

        .btn-ai {
            background: linear-gradient(135deg, #8e44ad, #d63031);
            color: #fff;
            box-shadow: var(--ai-glow);
        }

        .btn-ai:hover {
            box-shadow: 0 0 30px rgba(214, 48, 49, 0.6);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-waiting {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
        }

        .status-success {
            background: rgba(0, 210, 211, 0.15);
            color: #00ecda;
            border: 1px solid rgba(0, 210, 211, 0.3);
        }

        .status-loading {
            background: rgba(108, 92, 231, 0.15);
            color: #a29bfe;
            border: 1px solid var(--accent);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-glass);
            text-transform: uppercase;
        }

        .data-table td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-glass);
        }

        .team-chip {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        /* Settings Modal */
        #settingsOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--sidebar-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 16px;
        }

        .field-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .setting-section {
            margin-bottom: 24px;
        }

        .setting-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        /* Summary Area */
        .summary-box {
            background: rgba(108, 92, 231, 0.05);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .progress-indicator {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        #toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--accent);
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        #toast.show {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- ── Sidebar ── -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-box">P</div>
            <div class="logo-text">POSI AI HUB</div>
        </div>
        <div class="nav-sections">
            <div class="nav-label">Team Entries</div>
            <div class="nav-item active" onclick="switchView('bat')">
                <div class="nav-dot dot-bat"></div>BAT
            </div>
            <div class="nav-item" onclick="switchView('pmi')">
                <div class="nav-dot dot-pmi"></div>PMI
            </div>
            <div class="nav-item" onclick="switchView('ktg')">
                <div class="nav-dot dot-ktg"></div>KT&G
            </div>
            <div class="nav-item" onclick="switchView('eliz')">
                <div class="nav-dot dot-eliz"></div>ELIZ
            </div>
            <div class="nav-item" onclick="switchView('uplus')">
                <div class="nav-dot dot-uplus"></div>U+
            </div>
            <div class="nav-label">Control Center</div>
            <div class="nav-item" onclick="switchView('manager')">
                <div class="nav-dot dot-mgr"></div>⚡ AI 취합 & 배포
            </div>
        </div>
    </div>

    <!-- ── Main Content ── -->
    <div class="main-container">
        <div class="top-bar">
            <div class="view-title" id="viewTitle">BAT 주간보고</div>
            <div class="user-controls">
                <div class="btn-settings" onclick="toggleSettings()" title="설정">⚙️</div>
            </div>
        </div>

        <div class="content-body">
            <!-- 📄 Team View -->
            <div id="teamPane" class="view-pane active">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📝 실시간 업무 보고 (Firebase 저장)</div>
                        <div id="lastUpdateBadge" class="status-badge status-waiting">대기 중</div>
                    </div>
                    <div class="input-group">
                        <textarea id="reportContent" class="textarea-premium"
                            placeholder="이번 주 업무 내용을 자유롭게 입력하세요..."></textarea>
                    </div>
                    <div class="action-bar">
                        <button class="btn-premium btn-primary" onclick="submitToFirebase()">☁️ Cloud 저장</button>
                    </div>
                </div>
            </div>

            <!-- ⚡ Manager View -->
            <div id="managerPane" class="view-pane">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📊 전체 부서 현황 (Firebase 로드)</div>
                        <button class="btn-premium btn-secondary" style="padding:8px 16px;"
                            onclick="loadAllFromFirebase()">🔄 새로고침</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>부서</th>
                                <th>상태</th>
                                <th>업무 내용</th>
                                <th>최종 수정</th>
                            </tr>
                        </thead>
                        <tbody id="managerTableBody"></tbody>
                    </table>
                </div>

                <div class="card" style="border: 1px solid var(--accent); background: rgba(108, 92, 231, 0.05);">
                    <div class="card-header">
                        <div class="card-title" style="color: var(--accent);">🤖 Gemini AI 통합 엔진</div>
                    </div>
                    <div class="action-bar" style="flex-wrap:wrap; gap:8px;">
                        <button class="btn-premium btn-ai" onclick="runGeminiAggregation()">✨ Gemini AI 취합 실행</button>
                        <button class="btn-premium" style="background:#2d3748; font-size:11px;"
                            onclick="listAvailableModels()">🔍 사용 가능 모델 확인</button>
                    </div>
                    <div class="progress-indicator" id="aiProgress">
                        <div class="progress-bar" id="aiProgressBar"></div>
                    </div>
                    <div id="aiSummary" class="summary-box" style="display:none;">AI가 분석 중입니다...</div>
                    <div class="action-bar" id="postAiActions"
                        style="margin-top:20px; display:none; flex-wrap:wrap; gap:8px;">
                        <button class="btn-premium btn-primary" onclick="saveReportToFirebase()">☁️ Firebase에 최종 보고서 저장
                            (URL 공유)</button>
                        <button class="btn-premium btn-secondary" onclick="downloadHtml()">⬇️ HTML 다운로드</button>
                        <button class="btn-premium" style="background:#444" onclick="deployToGithub()">🚀 GitHub 배포
                            (선택사항)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ⚙️ Settings Modal -->
    <div id="settingsOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3>⚙️ 시스템 설정</h3><span style="cursor:pointer;" onclick="toggleSettings()">✕</span>
            </div>

            <div class="setting-section">
                <div class="setting-title">Firebase Configuration (Firestore)</div>
                <textarea id="fbConfig" class="field-input" style="height:100px;"
                    placeholder='{ "apiKey": "...", "projectId": "posi-design", ... }'></textarea>
            </div>

            <div class="setting-section">
                <div class="setting-title">Gemini AI API Key</div>
                <input type="password" id="geminiKey" class="field-input" placeholder="AI API Key" />
            </div>

            <div class="setting-section">
                <div class="setting-title">GitHub (Deployment)</div>
                <input type="password" id="ghToken" class="field-input" placeholder="GitHub Token (ghp_...)" />
                <input type="text" id="ghRepo" class="field-input" value="renee1004/POSI-design" />
            </div>

            <button class="btn-premium btn-primary" style="width:100%" onclick="saveSettings()">💾 모든 설정 저장</button>
        </div>
    </div>

    <!-- 🍞 Toast -->
    <div id="toast"><span id="toastIcon">✅</span><span id="toastMsg">성공!</span></div>

    <script>
        // ── Initialization ──
        let currentTab = 'bat';
        const teams = {
            bat: { name: 'BAT', fb: 'BAT' },
            pmi: { name: 'PMI', fb: 'PMI' },
            ktg: { name: 'KTG', fb: 'KTG' },
            eliz: { name: 'ELIZ', fb: 'ELIZ' },
            uplus: { name: 'UPLUS', fb: 'UPLUS' }
        };

        let db;
        let aiAggregatedData = null;

        window.onload = () => {
            loadStoredSettings();
            initFirebase();
            loadTeamData();
            checkAndShowFinalReport();
        };

        function loadStoredSettings() {
            document.getElementById('fbConfig').value = localStorage.getItem('posi_fb_config') || '';
            document.getElementById('geminiKey').value = localStorage.getItem('posi_gemini_key') || '';
            document.getElementById('ghToken').value = localStorage.getItem('posi_gh_token') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('posi_gh_repo') || 'renee1004/POSI-design';
        }

        // ── Firebase Config (하드코딩 — 팀장들 별도 설정 불필요) ──
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBbP8bRR243tRj1KZ0vCbDMEVDjdEXXTWA",
            authDomain: "posi-design.firebaseapp.com",
            databaseURL: "https://posi-design-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "posi-design",
            storageBucket: "posi-design.firebasestorage.app",
            messagingSenderId: "122773865462",
            appId: "1:122773865462:web:666344c71cc29856babdd7"
        };

        function initFirebase() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.firestore();
                console.log("✅ Firebase 자동 연결 완료");
            } catch (e) { console.error("Firebase Init Error", e); }
        }

        // ── Navigation ──
        function switchView(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');

            if (tabId === 'manager') {
                document.getElementById('teamPane').classList.remove('active');
                document.getElementById('managerPane').classList.add('active');
                document.getElementById('viewTitle').textContent = 'AI 전체 취합 콘솔';
                loadAllFromFirebase();
            } else {
                currentTab = tabId;
                document.getElementById('managerPane').classList.remove('active');
                document.getElementById('teamPane').classList.add('active');
                document.getElementById('viewTitle').textContent = teams[tabId].name + ' 팀 보고';
                loadTeamData();
            }
        }

        // ── Firebase Logic ──
        async function loadTeamData() {
            if (!db) return;
            document.getElementById('reportContent').value = "로딩 중...";
            try {
                const doc = await db.collection('weekly_reports').doc(currentTab).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('reportContent').value = data.content || '';
                    document.getElementById('lastUpdateBadge').textContent = '☁️ 연결됨';
                    document.getElementById('lastUpdateBadge').className = 'status-badge status-success';
                } else {
                    document.getElementById('reportContent').value = '';
                    document.getElementById('lastUpdateBadge').textContent = '데이터 없음';
                }
            } catch (e) { showToast("Firebase 로드 실패", "error"); }
        }

        async function submitToFirebase() {
            if (!db) return showToast("Firebase 설정을 먼저 완료하세요", "error");
            const content = document.getElementById('reportContent').value.trim();
            const badge = document.getElementById('lastUpdateBadge');

            badge.textContent = '⏳ 저장 중...';
            try {
                await db.collection('weekly_reports').doc(currentTab).set({
                    team: currentTab,
                    content: content,
                    updated_at: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                showToast("구름 위로 전송 완료!", "success");
                badge.textContent = '✅ 저장됨';
                badge.className = 'status-badge status-success';
            } catch (e) { showToast("저장 실패: " + e.message, "error"); }
        }

        async function loadAllFromFirebase() {
            const tbody = document.getElementById('managerTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">데이터를 불러오는 중...</td></tr>';
            if (!db) return tbody.innerHTML = '<tr><td colspan="4">설정에서 Firebase를 먼저 등록하세요.</td></tr>';

            try {
                const snapshot = await db.collection('weekly_reports').get();
                const dataMap = {};
                snapshot.forEach(doc => dataMap[doc.id] = doc.data());

                tbody.innerHTML = '';
                for (let key in teams) {
                    const item = dataMap[key] || { content: '(미제출)', updated_at: null };
                    const row = document.createElement('tr');
                    const time = item.updated_at ? item.updated_at.toDate().toLocaleString() : '-';
                    row.innerHTML = `
                        <td><span class="team-chip dot-${key}" style="background:rgba(255,255,255,0.1); border:1px solid var(--${key})">${teams[key].name}</span></td>
                        <td><span class="status-badge ${item.content === '(미제출)' ? 'status-waiting' : 'status-success'}">${item.content === '(미제출)' ? '대기' : '완료'}</span></td>
                        <td style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${item.content}</td>
                        <td style="font-size:11px; color:var(--text-secondary)">${time}</td>
                    `;
                    tbody.appendChild(row);
                }
            } catch (e) { tbody.innerHTML = `<tr><td colspan="4">오류: ${e.message}</td></tr>`; }
        }

        // ── List Available Models ──
        async function listAvailableModels() {
            const key = localStorage.getItem('posi_gemini_key');
            if (!key) return showToast('Gemini API Key가 없습니다', 'error');
            const summaryBox = document.getElementById('aiSummary');
            summaryBox.style.display = 'block';
            summaryBox.textContent = '🔍 사용 가능한 모델 조회 중...';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                const models = data.models
                    .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                    .map(m => m.name);
                summaryBox.innerHTML = `<strong>✅ generateContent 사용 가능 모델 목록:</strong><br><br>${models.join('<br>')}`;
            } catch (e) {
                summaryBox.textContent = '❌ 모델 조회 실패: ' + e.message;
            }
        }

        // ── Gemini AI Logic ──
        async function runGeminiAggregation() {
            const key = localStorage.getItem('posi_gemini_key');
            if (!key) return showToast("Gemini API Key가 없습니다", "error");
            if (!db) return showToast("Firebase 연결이 필요합니다", "error");

            const summaryBox = document.getElementById('aiSummary');
            summaryBox.style.display = 'block';
            summaryBox.textContent = "🚀 모든 팀의 데이터를 수집하여 분석 중입니다...";
            setAiProgress(20);

            try {
                // 1. Collect all data
                const snapshot = await db.collection('weekly_reports').get();
                let fullContext = "";
                let count = 0;
                snapshot.forEach(doc => {
                    if (doc.data().content) {
                        fullContext += `[Team: ${doc.id}]\n${doc.data().content}\n\n`;
                        count++;
                    }
                });

                if (count === 0) {
                    throw new Error("취합할 데이터가 없습니다. 먼저 각 팀 방에서 내용을 입력하고 'Cloud 저장'을 눌러주세요.");
                }

                console.log(`Found ${count} reports. Context:`, fullContext);
                summaryBox.textContent = `🚀 ${count}개 부서 데이터를 성공적으로 수집했습니다. 분석 중...`;
                setAiProgress(40);

                // 2. Prepare Prompt
                const prompt = `당신은 전문 PM입니다. 아래 팀 보고서를 분석하여 정확히 JSON만 출력하세요.

[팀 목록 - 반드시 이 순서, 이 cls 값 사용]
1. BAT팀 → cls: "BAT", dept: "BAT"
2. PMI팀 → cls: "PMI", dept: "PMI"  
3. KT&G글로벌팀 → cls: "KTG", dept: "KT&G글로벌"
4. 엘리자베스아덴팀 → cls: "ELIZ", dept: "엘리자베스아덴"
5. U+팀 → cls: "UPLUS", dept: "U+"

[데이터 스키마]
groups 배열: 반드시 위 5개 팀 순서대로
각 그룹: { dept, cls, rows: [{status, owner, task, d1, d2}] }
- status: "완료" | "진행중" | "예정"
- owner: 보고서에서 작성자/담당자 이름 추출 (없으면 팀명)
- task: 구체적인 업무 내용 (한국어)
- d1: 이번주 해당 요일 인덱스 배열 (월=0,화=1,수=2,목=3,금=4,토=5,일=6), 날짜 언급 없으면 []
- d2: 다음주 해당 요일 인덱스 배열, 없으면 []

[팀 보고서]
${fullContext}

[출력 형식 - JSON만, 다른 텍스트 절대 금지]
{
  "summary": "3문장 한국어 요약",
  "groups": [
    {"dept":"BAT","cls":"BAT","rows":[{"status":"완료","owner":"홍길동","task":"업무내용","d1":[0,1,2],"d2":[]}]},
    {"dept":"PMI","cls":"PMI","rows":[{"status":"진행중","owner":"김철수","task":"업무내용","d1":[],"d2":[0,1]}]},
    {"dept":"KT&G글로벌","cls":"KTG","rows":[{"status":"예정","owner":"이영희","task":"업무내용","d1":[],"d2":[]}]},
    {"dept":"엘리자베스아덴","cls":"ELIZ","rows":[{"status":"진행중","owner":"박민준","task":"업무내용","d1":[],"d2":[]}]},
    {"dept":"U+","cls":"UPLUS","rows":[{"status":"완료","owner":"최지원","task":"업무내용","d1":[3,4],"d2":[]}]}
  ]
}`;

                setAiProgress(60);

                // 3. API Call (gemini-2.5-flash, v1beta)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.1 }
                    })
                });

                const result = await response.json();
                setAiProgress(90);

                if (result.error) throw new Error(result.error.message);

                if (result.candidates && result.candidates[0]) {
                    let rawText = result.candidates[0].content.parts[0].text;
                    console.log("AI Raw Text:", rawText);

                    // JSON 파싱 (마크다운 제거)
                    const jsonString = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    const parsed = JSON.parse(jsonString);

                    aiAggregatedData = parsed;
                    // localStorage에 저장 → weekly-report.html이 자동으로 불러옴
                    localStorage.setItem('posi_report_groups', JSON.stringify(parsed.groups));
                    localStorage.setItem('posi_report_summary', parsed.summary);
                    localStorage.setItem('posi_report_updated', new Date().toLocaleString('ko-KR'));
                    summaryBox.innerHTML = `<strong>✨ AI 분석 완료</strong><br><br>${parsed.summary.replace(/\n/g, '<br>')}<br><br><span style="color:#00d2d3;font-size:12px">✅ 데이터 저장됨 — weekly-report.html을 열면 자동 적용됩니다</span>`;
                    document.getElementById('postAiActions').style.display = 'flex';
                } else { throw new Error("AI 응답 형식이 올바르지 않습니다."); }

            } catch (e) {
                summaryBox.textContent = "❌ AI 분석 중 오류 발생: " + e.message;
            } finally { setAiProgress(0); }
        }

        // ── Save to Firebase ──
        async function saveReportToFirebase() {
            if (!aiAggregatedData || !db) return showToast("데이터 또는 Firebase 연결 없음", "error");
            try {
                await db.collection('final_reports').doc('latest').set({
                    summary: aiAggregatedData.summary,
                    groups: JSON.stringify(aiAggregatedData.groups),
                    updatedAt: new Date().toISOString()
                });
                showToast("✅ Firebase에 저장 완료! 이제 누구나 URL로 확인 가능합니다", "success");
            } catch (e) { showToast("저장 오류: " + e.message, "error"); }
        }

        async function checkAndShowFinalReport() {
            if (!db) return;
            try {
                const doc = await db.collection('final_reports').doc('latest').get();
                if (doc.exists) {
                    const data = doc.data();
                    const summaryBox = document.getElementById('aiSummary');
                    summaryBox.style.display = 'block';
                    summaryBox.innerHTML = `<strong>📋 최신 AI 취합 보고서</strong> <span style="font-size:11px;color:#888">${data.updatedAt ? '갱신: ' + data.updatedAt.slice(0, 10) : ''}</span><br><br>${(data.summary || '').replace(/\n/g, '<br>')}`;
                    if (data.groups) {
                        aiAggregatedData = { summary: data.summary, groups: JSON.parse(data.groups) };
                        document.getElementById('postAiActions').style.display = 'flex';
                    }
                }
            } catch (e) { console.log('No final report yet:', e.message); }
        }

        // ── Output Logic ──
        async function deployToGithub() {
            if (!aiAggregatedData) return;
            const token = localStorage.getItem('posi_gh_token');
            const repo = localStorage.getItem('posi_gh_repo');
            if (!token || !repo) return showToast("GitHub 설정이 필요합니다", "error");

            showToast("🚀 GitHub 배포 시작...", "success");

            try {
                // 1. Get Template (fetch 실패 시 파일 선택)
                let templateText;
                try {
                    const templateRes = await fetch('./weekly-report.html');
                    if (!templateRes.ok) throw new Error('fetch blocked');
                    templateText = await templateRes.text();
                } catch (fetchErr) {
                    templateText = await pickTemplateFile();
                    if (!templateText) return;
                }

                // 2. Replace Data (POSI_END 마커 기반)
                const updatedHtml = applyDataToTemplate(templateText, aiAggregatedData.groups);

                // 3. GitHub PUT
                const path = "weekly-report.html";
                const apiUrl = `https://api.github.com/repos/${repo}/contents/${path}`;
                const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' };

                let sha = null;
                const getRes = await fetch(apiUrl, { headers });
                if (getRes.ok) sha = (await getRes.json()).sha;

                const body = {
                    message: "📊 AI-Generated Weekly Report Update",
                    content: btoa(unescape(encodeURIComponent(updatedHtml))),
                    branch: "main"
                };
                if (sha) body.sha = sha;

                const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
                if (putRes.ok) showToast("🎉 GitHub 배포 성공! URL에서 확인하세요.", "success");
                else throw new Error((await putRes.json()).message || "배포 실패");

            } catch (e) { showToast("배포 오류: " + e.message, "error"); }
        }

        function applyDataToTemplate(templateText, groups) {
            const newJsonStr = JSON.stringify(groups, null, 2);
            // POSI_END 마커 기반 교체 (중첩 배열 대응)
            const result = templateText.replace(
                /const defaultGroups = [\s\S]*?\/\* POSI_END \*\//,
                `const defaultGroups = ${newJsonStr}; /* POSI_END */`
            );
            if (result === templateText) {
                // 마커가 없을 경우 fallback
                return templateText.replace(
                    /(const defaultGroups\s*=\s*)(\[[\s\S]*?\]\s*;)/,
                    `$1${newJsonStr};`
                );
            }
            return result;
        }

        async function pickTemplateFile() {
            return new Promise((resolve) => {
                showToast("📂 weekly-report.html 파일을 선택해 주세요", "success");
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.html';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) { resolve(null); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.readAsText(file);
                };
                input.click();
            });
        }

        async function downloadHtml() {
            if (!aiAggregatedData) return;
            showToast("파일 생성 중...", "success");
            try {
                let templateText;
                try {
                    const res = await fetch('./weekly-report.html');
                    if (!res.ok) throw new Error('fetch blocked');
                    templateText = await res.text();
                } catch (fetchErr) {
                    // 로컬 파일 보안 제한 → 파일 선택 다이얼로그
                    templateText = await pickTemplateFile();
                    if (!templateText) return;
                }

                const updatedHtml = applyDataToTemplate(templateText, aiAggregatedData.groups);
                const blob = new Blob([updatedHtml], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `weekly-report-${new Date().toISOString().slice(0, 10)}.html`;
                a.click();
                showToast("✅ 다운로드 완료!", "success");
            } catch (e) {
                showToast("❌ " + e.message, "error");
                console.error(e);
            }
        }

        // ── Utils ──
        function toggleSettings() {
            const el = document.getElementById('settingsOverlay');
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            localStorage.setItem('posi_fb_config', document.getElementById('fbConfig').value.trim());
            localStorage.setItem('posi_gemini_key', document.getElementById('geminiKey').value.trim());
            localStorage.setItem('posi_gh_token', document.getElementById('ghToken').value.trim());
            localStorage.setItem('posi_gh_repo', document.getElementById('ghRepo').value.trim());
            initFirebase();
            toggleSettings();
            showToast("모든 설정이 브라우저에 저장되었습니다");
            location.reload();
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.style.background = (type === 'success') ? 'var(--accent)' : 'var(--error)';
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setAiProgress(val) {
            const bar = document.getElementById('aiProgressBar');
            const ind = document.getElementById('aiProgress');
            if (val === 0) { ind.style.display = 'none'; return; }
            ind.style.display = 'block';
            bar.style.width = val + '%';
        }

        function setLoading(state) {
            document.querySelector('.btn-primary').disabled = state;
        }
    </script>
</body>
