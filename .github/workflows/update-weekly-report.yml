name: 📊 주간보고 자동 업데이트

on:
  # 1) JSON 커밋 워크플로우가 성공하면 이어서 실행
  workflow_run:
    workflows: ["📥 Issue JSON → data/latest.json 업데이트 커밋"]
    types:
      - completed

  # 2) 사람이 직접 data/*.json 을 푸시해도 실행되게 유지
  push:
    paths:
      - "data/*.json"

  # 3) (기존 유지) 외부 트리거/수동 실행도 유지
  repository_dispatch:
    types: [update_weekly_report]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-report-update
  cancel-in-progress: true

jobs:
  update-report:
    runs-on: ubuntu-latest

    # workflow_run일 때는 "성공한 경우"에만 실행
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # workflow_run으로 호출되면, 직전 워크플로우가 커밋한 HEAD SHA를 체크아웃
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📂 data/latest.json 읽기
        id: find_json
        run: |
          if [ -f "data/latest.json" ]; then
            echo "✅ 파일 발견: data/latest.json"
            JSON_CONTENT=$(cat "data/latest.json")
            echo "json_data<<EOF" >> $GITHUB_OUTPUT
            echo "$JSON_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "⚠️ data/latest.json 파일이 없습니다. 빈 배열로 진행합니다."
            echo "json_data=[]" >> $GITHUB_OUTPUT
          fi

      - name: 📝 index.html 생성
        run: |
          python3 - << 'PYEOF'
          import json, sys, re, os
          from datetime import datetime

          # 1) JSON 데이터 가져오기
          json_data = '''${{ steps.find_json.outputs.json_data }}'''

          if not json_data or json_data.strip() == '[]':
              print("⚠️ JSON 데이터가 비어있습니다. 기본 템플릿으로 생성합니다.")
              groups = []
          else:
              try:
                  groups = json.loads(json_data)
                  print(f"✅ {len(groups)}개 부서 데이터 파싱 완료")
              except json.JSONDecodeError as e:
                  print(f"❌ JSON 파싱 오류: {e}")
                  print("빈 배열로 진행합니다.")
                  groups = []

          # 2) 템플릿 파일 읽기 (weekly-report.html 우선, 없으면 '주간 보고서.html')
          template_path = 'weekly-report.html'
          if not os.path.exists(template_path):
              template_path = '주간 보고서.html'
              if not os.path.exists(template_path):
                  print("❌ 템플릿 파일을 찾을 수 없습니다: weekly-report.html / 주간 보고서.html")
                  sys.exit(1)

          with open(template_path, 'r', encoding='utf-8') as f:
              template = f.read()

          # 3) const defaultGroups = [...]; 교체
          new_data = json.dumps(groups, ensure_ascii=False, indent=2)
          pattern = r'(const defaultGroups\s*=\s*)(\[[\s\S]*?\]);'
          replacement = f'\\1{new_data};'
          new_html, count = re.subn(pattern, replacement, template)

          if count == 0:
              print("❌ defaultGroups 패턴을 찾지 못했습니다. 템플릿의 JS 구문을 확인해주세요.")
              sys.exit(1)
          else:
              print(f"✅ defaultGroups 데이터 교체 완료 ({count}곳)")

          # 4) 생성 시간 메타 주석 추가
          now = datetime.now().strftime('%Y-%m-%d %H:%M')
          meta_comment = f'<!-- 자동 생성: {now} by GitHub Actions -->\n'
          new_html = meta_comment + new_html

          # 5) index.html 저장
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(new_html)

          print(f"✅ index.html 생성 완료 ({len(new_html):,} bytes)")
          PYEOF

      - name: 🚀 GitHub Pages에 배포 (index.html 커밋/푸시)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "POSI 자동보고봇"
          git add index.html

          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항 없음 — 커밋 건너뜀"
          else
            WEEK=$(date +%Y-W%V)
            git commit -m "📊 주간업무보고 자동 업데이트 — ${WEEK}"
            git push
            echo "✅ GitHub Pages 배포 완료!"
          fi
