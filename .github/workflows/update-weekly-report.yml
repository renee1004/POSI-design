name: 📊 주간보고 자동 업데이트

on:
  repository_dispatch:
    types: [update_weekly_report]
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
      
      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📂 data 폴더에서 최신 JSON 읽기
        id: find_json
        run: |
          # data/ 폴더에서 가장 최신 JSON 파일 찾기
          if [ -d "data" ]; then
            LATEST_JSON=$(ls -t data/*.json 2>/dev/null | head -1)
            
            if [ -z "$LATEST_JSON" ]; then
              echo "⚠️ data 폴더에 JSON 파일이 없습니다. 빈 배열로 진행합니다."
              echo "json_data=[]" >> $GITHUB_OUTPUT
            else
              echo "✅ 파일 발견: $LATEST_JSON"
              JSON_CONTENT=$(cat "$LATEST_JSON")
              echo "json_data<<EOF" >> $GITHUB_OUTPUT
              echo "$JSON_CONTENT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ data 폴더가 없습니다. 빈 배열로 진행합니다."
            echo "json_data=[]" >> $GITHUB_OUTPUT
          fi
      
      - name: 📝 index.html 생성
        run: |
          python3 - << 'PYEOF'
          import json, sys, re, os
          from datetime import datetime
          
          # 1. JSON 데이터 가져오기 (GitHub Output에서)
          json_data = '''${{ steps.find_json.outputs.json_data }}'''
          
          if not json_data or json_data.strip() == '[]':
              print("⚠️ JSON 데이터가 비어있습니다. 기본 템플릿으로 생성합니다.")
              groups = []
          else:
              try:
                  groups = json.loads(json_data)
                  print(f"✅ {len(groups)}개 부서 데이터 파싱 완료")
              except json.JSONDecodeError as e:
                  print(f"❌ JSON 파싱 오류: {e}")
                  print("빈 배열로 진행합니다.")
                  groups = []
          
          # 2. 템플릿 파일 읽기 (weekly-report.html)
          template_path = 'weekly-report.html'
          if not os.path.exists(template_path):
              # 템플릿이 없으면 주간 보고서.html 시도
              template_path = '주간 보고서.html'
              if not os.path.exists(template_path):
                  print(f"❌ 템플릿 파일을 찾을 수 없습니다")
                  sys.exit(1)
          
          with open(template_path, 'r', encoding='utf-8') as f:
              template = f.read()
          
          # 3. defaultGroups 부분 교체
          new_data = json.dumps(groups, ensure_ascii=False, indent=2)
          
          # const defaultGroups = [...]; 패턴 찾아서 교체
          pattern = r'(const defaultGroups\s*=\s*)(\[[\s\S]*?\]);'
          replacement = f'\\1{new_data};'
          
          new_html, count = re.subn(pattern, replacement, template)
          
          if count == 0:
              print("⚠️ defaultGroups 패턴을 찾지 못했습니다.")
              print("템플릿을 그대로 사용합니다.")
              new_html = template
          else:
              print(f"✅ defaultGroups 데이터 교체 완료 ({count}곳)")
          
          # 4. 생성 시간 메타 주석 추가
          now = datetime.now().strftime('%Y-%m-%d %H:%M')
          meta_comment = f'<!-- 자동 생성: {now} by GitHub Actions -->\n'
          new_html = meta_comment + new_html
          
          # 5. index.html로 저장
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(new_html)
          
          print(f"✅ index.html 생성 완료 ({len(new_html):,} bytes)")
          PYEOF
      
      - name: 🚀 GitHub Pages에 배포
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "POSI 자동보고봇"
          git add index.html
          
          # 변경사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항 없음 — 커밋 건너뜀"
          else
            WEEK=$(date +%Y-W%V)
            git commit -m "📊 주간업무보고 자동 업데이트 — ${WEEK}"
            git push
            echo "✅ GitHub Pages 배포 완료!"
          fi
