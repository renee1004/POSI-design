<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSI 보고서 GitHub 업로더</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1623;
            --surface: #1a2235;
            --surface2: #212d42;
            --border: #2d3f5e;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --warn: #f59e0b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 12px;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
        }

        /* ── 헤더 ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1e3a5f, #2d5f9e);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .header-sub {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── 카드 ── */
        .card {
            width: 100%;
            max-width: 820px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── 토큰 입력 ── */
        .token-row {
            display: flex;
            gap: 10px;
        }

        .token-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text);
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color .2s;
        }

        .token-input:focus {
            border-color: var(--accent);
        }

        .token-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-save-token {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-save-token:hover {
            border-color: var(--accent);
            color: #60a5fa;
        }

        .token-status {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .token-status.ok {
            color: var(--success);
        }

        .token-status.err {
            color: var(--error);
        }

        /* ── 설정 행 ── */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 560px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }

        .field-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .field-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }

        .field-input:focus {
            border-color: var(--accent);
        }

        /* ── HTML 텍스트 영역 ── */
        .html-area {
            width: 100%;
            min-height: 240px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            font-size: 12px;
            color: #93c5fd;
            font-family: 'Courier New', monospace;
            outline: none;
            resize: vertical;
            transition: border-color .2s;
            line-height: 1.5;
        }

        .html-area:focus {
            border-color: var(--accent);
        }

        .html-area::placeholder {
            color: var(--text-muted);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
        }

        .area-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-clear {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-clear:hover {
            color: var(--error);
            border-color: var(--error);
        }

        .char-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            align-self: center;
        }

        /* ── 업로드 버튼 ── */
        .upload-btn {
            width: 100%;
            max-width: 820px;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(37, 99, 235, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.45);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        .upload-btn:disabled {
            background: var(--surface2);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ── 상태 패널 ── */
        .status-panel {
            width: 100%;
            max-width: 820px;
            border-radius: var(--radius);
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .status-panel.show {
            display: flex;
        }

        .status-panel.loading {
            background: rgba(59, 130, 246, .12);
            border: 1px solid rgba(59, 130, 246, .3);
            color: #60a5fa;
        }

        .status-panel.success {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .3);
            color: var(--success);
        }

        .status-panel.error {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            color: var(--error);
        }

        .status-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .status-text {
            line-height: 1.5;
        }

        .status-link {
            color: #60a5fa;
            text-decoration: none;
        }

        .status-link:hover {
            text-decoration: underline;
        }

        /* ── 안내 ── */
        .guide {
            width: 100%;
            max-width: 820px;
            margin-top: 4px;
        }

        .guide-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .guide-step:last-child {
            border-bottom: none;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .step-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .step-text strong {
            color: var(--text);
        }

        /* ── 스피너 ── */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(96, 165, 250, .3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }

        /* ── 푸터 ── */
        footer {
            margin-top: 40px;
            font-size: 11px;
            color: #334155;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-badge">POSI Design Team</div>
        <h1>🚀 주간보고 GitHub 업로더</h1>
        <p class="header-sub">GenSpark 취합방에서 생성된 HTML을 붙여넣고 버튼 하나로 GitHub Pages를 업데이트하세요</p>
    </div>

    <!-- ① GitHub 토큰 -->
    <div class="card">
        <div class="card-title">🔑 GitHub Personal Access Token</div>
        <div class="token-row">
            <input id="tokenInput" class="token-input" type="password"
                placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
            <button class="btn btn-save-token" onclick="saveToken()">저장</button>
            <button class="btn btn-save-token" onclick="clearToken()">삭제</button>
        </div>
        <div id="tokenStatus" class="token-status"></div>
        <div style="margin-top:10px; font-size:12px; color:var(--text-muted); line-height:1.6;">
            💡 토큰은 브라우저 localStorage에만 저장되며 외부로 전송되지 않습니다.<br>
            토큰 생성: <a href="https://github.com/settings/tokens/new?scopes=repo&description=POSI+Weekly+Report+Uploader"
                target="_blank" style="color:#60a5fa;">GitHub → Settings → Developer settings → Personal access tokens →
                Generate new token (classic)</a><br>
            권한: <strong style="color:#fbbf24;">repo</strong> (전체 체크) 만 선택
        </div>
    </div>

    <!-- ② 저장소 설정 -->
    <div class="card">
        <div class="card-title">⚙️ 저장소 설정</div>
        <div class="settings-grid">
            <div>
                <div class="field-label">GitHub 사용자명</div>
                <input id="ownerInput" class="field-input" type="text" value="renee1004" placeholder="renee1004" />
            </div>
            <div>
                <div class="field-label">저장소 이름</div>
                <input id="repoInput" class="field-input" type="text" value="POSI-design" placeholder="POSI-design" />
            </div>
            <div>
                <div class="field-label">파일 경로</div>
                <input id="pathInput" class="field-input" type="text" value="index.html" placeholder="index.html" />
            </div>
            <div>
                <div class="field-label">브랜치</div>
                <input id="branchInput" class="field-input" type="text" value="main" placeholder="main" />
            </div>
        </div>
    </div>

    <!-- ③ HTML 붙여넣기 -->
    <div class="card">
        <div class="card-title">📄 HTML 코드 붙여넣기</div>
        <textarea id="htmlArea" class="html-area"
            placeholder="취합·정리방에서 생성된 HTML 코드를 여기에 전체 붙여넣기 하세요 (Ctrl+V)&#10;&#10;<!DOCTYPE html>&#10;<html lang=&quot;ko&quot;>&#10;..."></textarea>
        <div class="area-actions">
            <button class="btn btn-clear" onclick="clearHtml()">🗑 지우기</button>
            <button class="btn btn-clear" onclick="pasteFromClipboard()">📋 클립보드에서 붙여넣기</button>
            <span class="char-count" id="charCount">0 글자</span>
        </div>
    </div>

    <!-- ④ 업로드 버튼 -->
    <button class="upload-btn" id="uploadBtn" onclick="uploadToGitHub()">
        🚀 GitHub에 업로드 — index.html 업데이트
    </button>

    <!-- 상태 패널 -->
    <div class="status-panel" id="statusPanel">
        <div class="status-icon" id="statusIcon"></div>
        <div class="status-text" id="statusText"></div>
    </div>

    <!-- 사용 방법 -->
    <div class="card guide" style="margin-top:24px;">
        <div class="card-title">📖 사용 방법</div>
        <div class="guide-step">
            <div class="step-num">1</div>
            <div class="step-text"><strong>GitHub Token 입력 & 저장</strong><br>위 링크에서 토큰을 만들고 입력 후 저장하세요. 한 번만 하면 돼요!</div>
        </div>
        <div class="guide-step">
            <div class="step-num">2</div>
            <div class="step-text"><strong>GenSpark 취합·정리방</strong>에서 "취합해줘" 입력<br>Prompt B가 생성한 HTML 코드 전체를 복사 (Ctrl+A
                → Ctrl+C)</div>
        </div>
        <div class="guide-step">
            <div class="step-num">3</div>
            <div class="step-text"><strong>HTML 코드 붙여넣기</strong><br>위 텍스트 박스에 Ctrl+V 또는 [클립보드에서 붙여넣기] 버튼 클릭</div>
        </div>
        <div class="guide-step">
            <div class="step-num">4</div>
            <div class="step-text"><strong>[🚀 GitHub에 업로드] 버튼 클릭</strong><br>자동으로 GitHub API를 통해 index.html을 업데이트해요
            </div>
        </div>
        <div class="guide-step">
            <div class="step-num">5</div>
            <div class="step-text"><strong>약 1분 후 링크 확인</strong><br>
                <a href="https://renee1004.github.io/POSI-design/" target="_blank" class="status-link">
                    👉 https://renee1004.github.io/POSI-design/
                </a>
            </div>
        </div>
    </div>

    <footer>
        POSI DESIGN TEAM · 주간업무보고 자동화 시스템 · Made by Antigravity 🤖
    </footer>

    <script>
        // ── 초기화 ──
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('posi_gh_token');
            if (saved) {
                document.getElementById('tokenInput').value = saved;
                showTokenStatus('ok', '✅ 저장된 토큰이 있습니다');
            }
            updateCharCount();
        });

        document.getElementById('htmlArea').addEventListener('input', updateCharCount);

        function updateCharCount() {
            const len = document.getElementById('htmlArea').value.length;
            document.getElementById('charCount').textContent = len.toLocaleString() + ' 글자';
        }

        // ── 토큰 관리 ──
        function saveToken() {
            const t = document.getElementById('tokenInput').value.trim();
            if (!t) { showTokenStatus('err', '❌ 토큰을 입력하세요'); return; }
            if (!t.startsWith('ghp_') && !t.startsWith('github_pat_')) {
                showTokenStatus('err', '❌ 유효한 GitHub 토큰 형식이 아닙니다 (ghp_ 또는 github_pat_ 로 시작해야 함)');
                return;
            }
            localStorage.setItem('posi_gh_token', t);
            showTokenStatus('ok', '✅ 토큰이 저장되었습니다! (브라우저 로컬에만 저장됩니다)');
        }

        function clearToken() {
            localStorage.removeItem('posi_gh_token');
            document.getElementById('tokenInput').value = '';
            showTokenStatus('', '🗑 토큰이 삭제되었습니다');
        }

        function showTokenStatus(type, msg) {
            const el = document.getElementById('tokenStatus');
            el.textContent = msg;
            el.className = 'token-status ' + type;
        }

        // ── HTML 관리 ──
        function clearHtml() {
            document.getElementById('htmlArea').value = '';
            updateCharCount();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('htmlArea').value = text;
                updateCharCount();
            } catch (e) {
                alert('클립보드 접근 권한이 필요합니다. 직접 Ctrl+V로 붙여넣기 해주세요.');
            }
        }

        // ── GitHub 업로드 ──
        async function uploadToGitHub() {
            const token = localStorage.getItem('posi_gh_token') || document.getElementById('tokenInput').value.trim();
            const owner = document.getElementById('ownerInput').value.trim();
            const repo = document.getElementById('repoInput').value.trim();
            const path = document.getElementById('pathInput').value.trim();
            const branch = document.getElementById('branchInput').value.trim();
            const html = document.getElementById('htmlArea').value;

            // 유효성 검사
            if (!token) { showStatus('error', '⚠️', '❌ GitHub 토큰을 입력하고 저장하세요!'); return; }
            if (!html.trim()) { showStatus('error', '⚠️', '❌ 업로드할 HTML 코드를 먼저 붙여넣어 주세요!'); return; }
            if (!html.includes('<!DOCTYPE html>') && !html.includes('<html')) {
                showStatus('error', '⚠️', '❌ 올바른 HTML 파일이 아닌 것 같아요. GenSpark에서 생성된 HTML 전체를 복사해 주세요.');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            showStatus('loading', '', '🔄 GitHub에 업로드 중... (잠시만 기다려 주세요)');

            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };

            try {
                // Step 1: 현재 파일 SHA 가져오기
                const getRes = await fetch(apiUrl + `?ref=${branch}`, { headers });
                let sha = null;
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                } else if (getRes.status !== 404) {
                    const err = await getRes.json();
                    throw new Error(`파일 조회 실패: ${err.message}`);
                }

                // Step 2: 파일 업데이트 (PUT)
                const now = new Date();
                const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

                const body = {
                    message: `📊 주간업무보고 업데이트 — ${dateStr}`,
                    content: btoa(unescape(encodeURIComponent(html))),
                    branch: branch
                };
                if (sha) body.sha = sha;

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify(body)
                });

                if (!putRes.ok) {
                    const err = await putRes.json();
                    if (putRes.status === 401) throw new Error('토큰 인증 실패: 토큰이 유효한지 확인하세요 (repo 권한 필요)');
                    if (putRes.status === 403) throw new Error('권한 없음: 토큰에 repo 쓰기 권한이 있는지 확인하세요');
                    throw new Error(`업로드 실패 (${putRes.status}): ${err.message}`);
                }

                // 성공!
                const pagesUrl = `https://${owner}.github.io/${repo}/`;
                showStatus('success', '🎉',
                    `✅ 업로드 성공! 약 1분 후 아래 링크에서 최신 보고서를 확인하세요.<br>` +
                    `<a href="${pagesUrl}" target="_blank" class="status-link">👉 ${pagesUrl}</a>`
                );

            } catch (err) {
                showStatus('error', '❌', `업로드 실패: ${err.message}`);
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(type, icon, message) {
            const panel = document.getElementById('statusPanel');
            const iconEl = document.getElementById('statusIcon');
            const textEl = document.getElementById('statusText');

            panel.className = 'status-panel show ' + type;
            textEl.innerHTML = message;

            if (type === 'loading') {
                iconEl.innerHTML = '<div class="spinner"></div>';
            } else {
                iconEl.textContent = icon;
            }

            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>

</html>
